<!DOCTYPE html>
<html>
<head>
    <title>Spieler Tracker - Passwort ändern</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* basic styling reused */
        * {margin:0;padding:0;box-sizing:border-box;}
        body {background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;}
        .container {background:#1e293b;padding:40px;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.5);width:100%;max-width:380px;}
        h1 {color:white;margin-bottom:10px;font-size:28px;text-align:center;}
        .subtitle {color:#94a3b8;text-align:center;margin-bottom:30px;font-size:14px;}
        .form-group{margin-bottom:20px;}
        .form-group label{display:block;margin-bottom:8px;color:#cbd5e1;font-weight:600;font-size:14px;}
        .form-group input{width:100%;padding:12px 15px;border:2px solid #334155;border-radius:10px;background:#0f172a;color:white;font-size:15px;transition:0.3s;}
        .form-group input:focus{border-color:#3b82f6;box-shadow:0 0 10px rgba(59,130,246,0.2);outline:none;}
        .form-group input::placeholder{color:#64748b;}
        button{width:100%;padding:12px;background:#3b82f6;color:white;border:none;border-radius:10px;font-weight:600;font-size:15px;cursor:pointer;transition:0.3s;margin-top:10px;}
        button:hover{background:#2563eb;box-shadow:0 0 20px rgba(59,130,246,0.5);}
        .message{color:#22c55e;margin-bottom:10px;text-align:center;}
        .error{color:#ef4444;margin-bottom:10px;text-align:center;}
        a {color:#3b82f6;text-decoration:none;}
    </style>
</head>
<body>
<div class="container">
    <h1>🔑 Passwort ändern</h1>
    <p class="subtitle">Sicher bleiben</p>
    {% if message %}<div class="message">{{ message }}</div>{% endif %}
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST">
        <div class="form-group">
            <label>Altes Passwort</label>
            <input type="password" name="old_password" required>
        </div>
        <div class="form-group">
            <label>Neues Passwort</label>
            <input type="password" name="new_password" required>
        </div>
        <button type="submit">Ändern</button>
    </form>
    <div style="margin-top:20px;text-align:center;"><a href="/">Zurück zur Übersicht</a></div>
</div>
</body>
</html>
