<!DOCTYPE html>
<html>
<head>
<title>📈 Spieler Trends</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>

body {
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    font-family: 'Inter', sans-serif;
    color: white;
    padding: 40px;
    margin: 0;
}

.container {
    max-width: 1200px;
    margin: 0 auto;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
}

.header h1 {
    margin: 0;
    font-size: 32px;
    background: linear-gradient(135deg, #3b82f6, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.back-link {
    background: #374151;
    color: white;
    padding: 10px 20px;
    border-radius: 10px;
    text-decoration: none;
    transition: 0.3s;
    font-weight: 600;
}

.back-link:hover {
    box-shadow: 0 0 20px rgba(55, 65, 81, 0.8);
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
}

.stat-box {
    background: #1e293b;
    padding: 25px;
    border-radius: 15px;
    border: 2px solid #334155;
    transition: 0.3s;
}

.stat-box:hover {
    border-color: #3b82f6;
    box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
    transform: translateY(-5px);
}

.stat-box h3 {
    margin: 0 0 10px 0;
    font-size: 14px;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.stat-box .number {
    font-size: 36px;
    font-weight: bold;
    background: linear-gradient(135deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.chart-container {
    background: #1e293b;
    padding: 30px;
    border-radius: 15px;
    margin-bottom: 30px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
}

.chart-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 20px;
    color: white;
}

canvas {
    max-height: 400px;
}

.chart-legend {
    display: flex;
    gap: 30px;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid #334155;
    flex-wrap: wrap;
}

.legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
}

.legend-color {
    width: 20px;
    height: 20px;
    border-radius: 4px;
}

.legend-color.active {
    background: #22c55e;
}

.legend-color.inactive {
    background: #ef4444;
}

.legend-color.total {
    background: #3b82f6;
}

.legend-text {
    color: #cbd5e1;
    font-size: 14px;
}

</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📈 Spieler Trends</h1>
        <a href="/" class="back-link">← Zurück</a>
    </div>
    
    <div class="stats-grid">
        <div class="stat-box">
            <h3>📊 Gesamt Heute</h3>
            <div class="number">{{ stats.total_today }}</div>
        </div>
        <div class="stat-box">
            <h3>✅ Aktiv Heute</h3>
            <div class="number" style="background: linear-gradient(135deg, #22c55e, #16a34a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">{{ stats.active_today }}</div>
        </div>
        <div class="stat-box">
            <h3>❌ Inaktiv Heute</h3>
            <div class="number" style="background: linear-gradient(135deg, #ef4444, #dc2626); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">{{ stats.inactive_today }}</div>
        </div>
    </div>
    
    <div class="chart-container">
        <div class="chart-title">📊 Spieler-Status letzte 30 Tage</div>
        <canvas id="trendsChart"></canvas>
        <div class="chart-legend">
            <div class="legend-item">
                <div class="legend-color total"></div>
                <div class="legend-text">Gesamt</div>
            </div>
            <div class="legend-item">
                <div class="legend-color active"></div>
                <div class="legend-text">Aktiv (≤7 Tage)</div>
            </div>
            <div class="legend-item">
                <div class="legend-color inactive"></div>
                <div class="legend-text">Inaktiv (>7 Tage)</div>
            </div>
        </div>
    </div>
</div>

<script>
const trendsData = JSON.parse('{{ weekly_data|tojson|safe }}');

const labels = trendsData.map(d => {
    const date = new Date(d.date);
    return date.toLocaleDateString('de-DE', { month: 'short', day: 'numeric' });
});

const totalData = trendsData.map(d => d.total);
const activeData = trendsData.map(d => d.active);
const inactiveData = trendsData.map(d => d.inactive);

const ctx = document.getElementById('trendsChart').getContext('2d');
new Chart(ctx, {
    type: 'line',
    data: {
        labels: labels,
        datasets: [
            {
                label: 'Gesamt',
                data: totalData,
                borderColor: '#3b82f6',
                backgroundColor: 'rgba(59, 130, 246, 0.1)',
                borderWidth: 2,
                tension: 0.4,
                pointRadius: 4,
                pointBackgroundColor: '#3b82f6',
                pointBorderColor: '#1e293b',
                pointBorderWidth: 2,
                fill: true
            },
            {
                label: 'Aktiv',
                data: activeData,
                borderColor: '#22c55e',
                backgroundColor: 'rgba(34, 197, 94, 0.1)',
                borderWidth: 2,
                tension: 0.4,
                pointRadius: 4,
                pointBackgroundColor: '#22c55e',
                pointBorderColor: '#1e293b',
                pointBorderWidth: 2,
                fill: true
            },
            {
                label: 'Inaktiv',
                data: inactiveData,
                borderColor: '#ef4444',
                backgroundColor: 'rgba(239, 68, 68, 0.1)',
                borderWidth: 2,
                tension: 0.4,
                pointRadius: 4,
                pointBackgroundColor: '#ef4444',
                pointBorderColor: '#1e293b',
                pointBorderWidth: 2,
                fill: true
            }
        ]
    },
    options: {
        responsive: true,
        maintainAspectRatio: true,
        interaction: {
            intersect: false,
            mode: 'index'
        },
        plugins: {
            legend: {
                display: false
            },
            tooltip: {
                backgroundColor: 'rgba(0, 0, 0, 0.8)',
                titleColor: '#fff',
                bodyColor: '#cbd5e1',
                borderColor: '#3b82f6',
                borderWidth: 1,
                padding: 12,
                titleFont: { size: 14, weight: 'bold' },
                bodyFont: { size: 12 }
            }
        },
        scales: {
            y: {
                beginAtZero: true,
                ticks: { color: '#cbd5e1' },
                grid: { color: 'rgba(203, 213, 225, 0.1)' }
            },
            x: {
                ticks: { color: '#cbd5e1' },
                grid: { color: 'rgba(203, 213, 225, 0.1)' }
            }
        }
    }
});
</script>

</body>
</html>
